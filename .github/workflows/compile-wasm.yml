name: Compile App to WASM

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App class name (e.g. MyApp). Leave empty to build the default demo.'
        required: false
        default: ''
      app_instance:
        description: 'Global instance variable name (e.g. myApp). Auto-derived if empty.'
        required: false
        default: ''
      app_header_b64:
        description: 'Base64-encoded .h file content'
        required: false
        default: ''
      app_cpp_b64:
        description: 'Base64-encoded .cpp file content'
        required: false
        default: ''

jobs:
  build-wasm:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Verify wasm directory exists
        run: |
          if [ ! -f "wasm/CMakeLists.txt" ]; then
            echo "::error::wasm/CMakeLists.txt not found. Make sure your fork is synced with the upstream repo."
            echo "Files in repo root:"
            ls -la
            echo "Contents of wasm/ (if it exists):"
            ls -la wasm/ 2>/dev/null || echo "wasm/ directory does not exist"
            exit 1
          fi
          echo "wasm/CMakeLists.txt found"

      - name: Cache Emscripten SDK
        uses: actions/cache@v4
        with:
          path: emsdk
          key: emsdk-3.1.51

      - name: Install Emscripten SDK
        run: |
          if [ ! -d "emsdk" ]; then
            git clone https://github.com/emscripten-core/emsdk.git
          fi
          cd emsdk
          ./emsdk install 3.1.51
          ./emsdk activate 3.1.51

      - name: Install build tools
        run: pip install ninja

      - name: Cache WASM build artifacts
        uses: actions/cache@v4
        with:
          path: wasm/build
          key: wasm-build-${{ hashFiles('wasm/CMakeLists.txt', 'lib/**', 'wasm/hal/**', 'wasm/shims/**') }}
          restore-keys: wasm-build-

      - name: Decode and write custom app (if provided)
        if: inputs.app_name != '' && inputs.app_header_b64 != ''
        env:
          APP_NAME: ${{ inputs.app_name }}
          APP_HEADER_B64: ${{ inputs.app_header_b64 }}
          APP_CPP_B64: ${{ inputs.app_cpp_b64 }}
        run: |
          mkdir -p wasm/app
          echo "${APP_HEADER_B64}" | base64 -d > "wasm/app/${APP_NAME}.h"
          echo "${APP_CPP_B64}" | base64 -d > "wasm/app/${APP_NAME}.cpp"
          printf '#include "App.h"\n#include "%s.h"\n' "${APP_NAME}" > wasm/app/app_include.h
          echo "=== Custom app files ==="
          ls -la wasm/app/
          echo "=== Header preview ==="
          head -5 "wasm/app/${APP_NAME}.h"

      - name: Generate version.h
        env:
          CYBERFIDGET_BUILD_TYPE_OVERRIDE: wasm
        run: |
          mkdir -p wasm/generated
          python scripts/generate_version.py --standalone --out wasm/generated/version.h --repo-root .

      - name: Build WASM
        env:
          APP_NAME: ${{ inputs.app_name }}
          APP_INSTANCE: ${{ inputs.app_instance }}
          APP_HEADER_B64: ${{ inputs.app_header_b64 }}
        run: |
          source emsdk/emsdk_env.sh

          mkdir -p wasm/build

          CMAKE_CMD="emcmake cmake"
          CMAKE_CMD="$CMAKE_CMD -S wasm -B wasm/build"
          CMAKE_CMD="$CMAKE_CMD -G Ninja"
          CMAKE_CMD="$CMAKE_CMD -DCMAKE_BUILD_TYPE=Release"

          if [ -n "$APP_NAME" ] && [ -n "$APP_HEADER_B64" ]; then
            CMAKE_CMD="$CMAKE_CMD -DWASM_APP=Custom"
            CMAKE_CMD="$CMAKE_CMD -DCUSTOM_APP_NAME=${APP_NAME}"
            if [ -n "$APP_INSTANCE" ]; then
              CMAKE_CMD="$CMAKE_CMD -DCUSTOM_APP_INSTANCE=${APP_INSTANCE}"
            fi
          fi

          echo "Running: $CMAKE_CMD"
          $CMAKE_CMD

          cmake --build wasm/build

          echo "=== Build output ==="
          ls -la wasm/build/cyberfidget.*

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-app
          path: |
            wasm/build/cyberfidget.js
            wasm/build/cyberfidget.wasm
          retention-days: 7
