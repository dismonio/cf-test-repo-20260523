; CyberFidget Music Player Firmware
; Branch: music_player_v2
; Stripped build targeting BT A2DP + MP3 playback within IRAM budget
;
; Usage:
;   pio run -e local -t upload     ; Flash over USB serial
;   pio run -e remote -t upload    ; Flash over SSH (flash_remote.bat)
;   pio run -e local -t monitor    ; Serial monitor (local only)
;
; Switch active env in VSCode: click the env name in the status bar (bottom)

[platformio]
default_envs = local

; ============================================================
; Shared base config — inherited by both 'local' and 'remote'
; ============================================================
[base]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/51.03.03/platform-espressif32.zip
board = adafruit_feather_esp32_v2
framework = arduino

; --- Memory & Partition ---
board_build.partitions = default_8MB.csv     ; ~3.2MB x2 APP partitions (OTA capable)
board_build.flash_mode = qio
board_build.f_cpu = 240000000L              ; 240MHz (WiFi/BT)
board_build.flash_freq = 80000000L
board_build.flash_size = 8MB
board_build.psram = enabled

; --- Build Type ---
build_type = release                        ; Critical: release avoids debug IRAM overhead

; --- Library Resolution ---
lib_ldf_mode = deep+
lib_extra_dirs = lib

lib_deps =
    thingpulse/ESP8266 and ESP32 OLED driver for SSD1306 displays@^4.6.1
    adafruit/Adafruit NeoPixel@^1.12.3
    sparkfun/SparkFun LIS2DH12 Arduino Library@^1.0.3
    sparkfun/SparkFun MAX1704x Fuel Gauge Arduino Library@^1.0.4
    ; Audio Stack
    git+https://github.com/pschatzmann/arduino-audio-tools.git#v1.2.0
    git+https://github.com/pschatzmann/ESP32-A2DP.git#v1.8.9
    git+https://github.com/pschatzmann/arduino-libhelix.git#v0.8.7
    ; WiFi Transfer (fallback mode - no WiFiManager needed, just raw AP + web server)
    git+https://github.com/me-no-dev/ESPAsyncWebServer.git

build_flags =
    ; --- Size Optimization ---
    -Os

    ; --- Disable Logging (saves flash + RAM) ---
    -DCORE_DEBUG_LEVEL=0
    -DCONFIG_ARDUHAL_LOG_DEFAULT_LEVEL=0
    -DNDEBUG

    ; --- BT Config ---
    ; NOTE: Do NOT set -DCONFIG_BT_BLE_ENABLED=0 here. The precompiled BT
    ; libraries were built with BLE support, so overriding the flag creates
    ; an inconsistent config that breaks esp_bt_controller_init().
    ; A2DPStream releases BLE memory at runtime via esp_bt_controller_mem_release().
    -DCONFIG_BT_NIMBLE_ENABLED=0

    ; --- AudioTools IRAM Diet ---
    -DAUDIOTOOLS_NO_ANALOG                   ; No analog audio drivers
    -DAUDIOTOOLS_NO_PWM                      ; No PWM audio
    -DAUDIOTOOLS_NO_ADC                      ; No ADC audio
    -DAUDIOTOOLS_NO_DAC                      ; No DAC audio

    ; --- SPP Support (override IDF 5.x gate - API confirmed present) ---
    -DA2DP_SPP_SUPPORT=1

    ; --- Additional IRAM Savings ---
    -DCONFIG_ESP32_WIFI_IRAM_OPT=0           ; WiFi IRAM optimizations off
    -DCONFIG_ESP32_WIFI_RX_IRAM_OPT=0
    ; NOTE: Do NOT set -DCONFIG_NEWLIB_NANO_FORMAT=1 here. The precompiled BT
    ; library was built WITHOUT this flag (TASK_EXTRA_STACK_SIZE=512), so our
    ; config struct would have a smaller stack size (3584 vs 4096), causing
    ; esp_bt_controller_init() to fail with ESP_ERR_INVALID_ARG.

    ; --- Force Strings to Flash ---
    -DPSTR_ALIGN=1

    ; --- Network includes (for ESPAsyncWebServer) ---
    -I $PROJECT_PACKAGES_DIR/framework-arduinoespressif32/libraries/Network/src
    -I $PROJECT_PACKAGES_DIR/framework-arduinoespressif32/libraries/NetworkClientSecure/src

    ; --- Generated version header (scripts/generate_version.py) ---
    -I generated

build_unflags = -I src

monitor_speed = 921600
monitor_filters = esp32_exception_decoder

extra_scripts =
    pre:scripts/generate_version.py
    pre:scripts/add_network_lib.py
    pre:scripts/add_iram_diet.py
    post:scripts/merge_firmware.py

; ============================================================
; Local USB serial flash
; ============================================================
[env:local]
extends = base
upload_speed = 921600

; ============================================================
; Remote SSH flash (via flash_remote.bat)
; ============================================================
[env:remote]
extends = base
upload_protocol = custom
upload_command = flash_remote.bat $SOURCE

; ============================================================
; Native test environments
; ============================================================
;
; These envs build & run on the developer's host (laptop) using the
; system compiler — fast feedback, no device or Arduino runtime.
; See test/README for the layout convention. See N-012 for the
; migration trigger when this list outgrows the central config.
;
; PlatformIO 6.x doesn't accept `test_dir` at the env level (it's a
; `[platformio]`-section option only). So tests for all envs live
; under the central `test/` directory; per-env scoping uses
; `test_filter` against `test_<scope>_*` naming convention.
;
; Run:  pio test -e test_core       (or)  pio test -e test_breakout
;       pio test                          (all envs above)
;
; Note: pio test inherits extra_scripts from any [platformio] /
; [base] section globally. We override with empty extra_scripts here
; so the SCons-based generate_version.py / add_iram_diet etc.
; (which target Arduino-ESP32) aren't pulled into native builds.

[env:test_core]
platform        = native
test_framework  = unity
test_filter     = test_core_*
extra_scripts   =
; lib_ldf_mode = off prevents PIO's auto-discovery from pulling Arduino-
; dependent libs in lib/ into the native build. Test envs include only
; what they explicitly list in lib_deps + what -I exposes.
lib_ldf_mode    = off
lib_deps        =
    throwtheswitch/Unity@^2.6.1
build_flags     = -std=gnu++17 -DHOST_TEST=1

[env:test_breakout]
platform        = native
test_framework  = unity
test_filter     = test_breakout_*
extra_scripts   =
lib_ldf_mode    = off
lib_deps        =
    throwtheswitch/Unity@^2.6.1
    file://lib/HALMock
build_flags     =
    -std=gnu++17
    -DHOST_TEST=1
    -I lib/BreakoutGame
    -I lib/HALMock
